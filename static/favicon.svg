<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>

  <!-- Tentacles (5, curling down from body) -->
  <path d="M8 24 Q6 28 5 31"   stroke="#E8520A" stroke-width="2"   stroke-linecap="round" fill="none"/>
  <path d="M12 26 Q11 29 10 32" stroke="#E8520A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M16 27 Q16 30 16 32" stroke="#E8520A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M20 26 Q21 29 22 32" stroke="#E8520A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M24 24 Q26 28 27 31" stroke="#E8520A" stroke-width="2"   stroke-linecap="round" fill="none"/>

  <!-- Left ear -->
  <polygon points="7,11 5,3 13,9" fill="#E8520A"/>
  <!-- Right ear -->
  <polygon points="25,11 27,3 19,9" fill="#E8520A"/>

  <!-- Head -->
  <circle cx="16" cy="17" r="11" fill="#E8520A"/>

  <!-- Eyes -->
  <circle cx="12"  cy="15" r="2.8" fill="white"/>
  <circle cx="20"  cy="15" r="2.8" fill="white"/>
  <circle cx="12.4" cy="15.4" r="1.4" fill="#111"/>
  <circle cx="20.4" cy="15.4" r="1.4" fill="#111"/>
  <circle cx="13"   cy="14.4" r="0.5" fill="white"/>
  <circle cx="21"   cy="14.4" r="0.5" fill="white"/>

  <!-- Nose -->
  <path d="M15 18.5 L16 20 L17 18.5 Z" fill="#c03a08"/>
</svg>
